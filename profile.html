.container {

section {

.header {

.header {

}
.header button {

/* =========================
   カスタムカーソル（本体）
========================= */
#custom-cursor {
  width: 28px;
  height: 28px;
  border: 2px solid rgba(74,163,255,0.8);
  border-radius: 50%;
  position: fixed;
  pointer-events: none;
  transform: translate(-50%, -50%);
  
  /* ⚠ filter は絶対に触らない */
  transition:
    transform 0.2s ease,
    opacity 0.2s ease;

      position: fixed;
  pointer-events: none;   /* これ重要 */
  z-index: 9999; 
}

/* ホバー時 */
#custom-cursor.hover {
  border-color: rgba(96, 162, 255, 0.9);
  width: 36px;
  height: 36px;
}

/* セクション共通（待機状態） */
.scroll-section {
  opacity: 0.35;                 /* ← うっすら表示 */
  transform: translateX(-120px) scale(0.96);
  filter: blur(2px);             /* ← 少しぼかす */
  transition:
    opacity 0.5s ease,
    transform 0.5s ease,
    filter 0.5s ease;
  will-change: opacity, transform, filter;
}

/* 現在表示中 */
.scroll-section.active {
  opacity: 1;
  transform: translateX(0) scale(1);
  filter: blur(0);
}

form {
  display: flex;

  gap: 16px;
}

label {

}

input,
textarea {
  background: #1b1b1b;
  color: white;
  border: 1px solid #444;
  border-radius: 8px;
  padding: 10px;
  font-size: 14px;
}

body.light-mode input,
body.light-mode textarea {
  background: #fff;
  color: #000;
  border-color: #ccc;
}

.custom-alert {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(-20px);
  background: #2ecc71;
  color: white;
  padding: 14px 20px;
  border-radius: 999px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: bold;
  opacity: 0;
  filter: blur(4px); /* ← 初期は少しぼかす */
  pointer-events: none;
  transition:
    opacity 0.4s ease,
    transform 0.4s ease,
    filter 0.4s ease;
  z-index: 2000;
}

/* 表示中 */
.custom-alert.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
  filter: blur(0); /* ← くっきり */
}

/* エラー */
.custom-alert.error {
  background: #e74c3c;
}

.alert-icon {
  font-size: 18px;
}
textarea {

/* テキスト用カラー変数（なければ追加） */
:root {
  --text-main: #eaeaea;
  --text-sub: #b0b0b0;
}

body.light-mode {
  --text-main: #111111;
  --text-sub: #666666;
}

.inline-small {
  font-size: 0.8em;     /* 親文字に対して少し小さく */
  color: var(--text-sub);
  vertical-align: baseline; /* 行ズレ防止 */
}

@media (hover: none) and (pointer: coarse) {
  #cursor-dot,
  #custom-cursor {
    display: none !important;
  }
}

#cursor-dot {
  position: fixed;
  width: 4px;
  height: 4px;
  background: #4aa3ff;
  border-radius: 50%;
  pointer-events: none;
  transform: translate(-50%, -50%);
  filter: blur(0.5px);
  z-index: 99999;
}

/* 波紋 */
.cursor-ripple {
  position: fixed;
  width: 10px;
  height: 10px;
  border: 2px solid rgba(74, 163, 255, 0.8);
  border-radius: 50%;
  pointer-events: none;
  transform: translate(-50%, -50%) scale(0);
  animation: ripple 0.6s ease-out forwards;
  z-index: 99998;
}

@keyframes ripple {
  to {
    transform: translate(-50%, -50%) scale(4);
    opacity: 0;
  }
}

  overflow: hidden;
    transition:
    transform 0.3s ease,
    box-shadow 0.3s ease;
}
/* ライトモード対応（必ず下に置く） */
body.light-mode .update-item {
  background: #c7c7c7;
  color: #000;
}

body.light-mode .update-header {
  color: #000;
}

.update-item:hover {
  transform: translateY(-4px);
  box-shadow: 0 15px 35px -10px rgba(0,0,0,0.4);
}

.update-header {
  padding: 15px;
  font-weight: bold;
  cursor: pointer;
  position: relative;
}

.update-header::after {
  content: "▶";
  position: absolute;
  right: 15px;
  transition: transform 0.3s ease;
}

.update-item.active .update-header::after {
  transform: rotate(90deg);
}

.update-content {
  max-height: 0;
  overflow: hidden;
  padding: 0 15px;

  transition:
    max-height 0.6s cubic-bezier(0.25, 0.8, 0.25, 1),
    padding 0.4s ease,
    opacity 0.4s ease;

  opacity: 0;
}

.update-item.active .update-content {

  padding: 20px 15px;
  opacity: 1;
}

/* スイッチ本体 */
.switch{
position:relative;
display:inline-block;
width:46px;
height:26px;
}

/* チェックボックス非表示 */
.switch input{
opacity:0;
width:0;
height:0;
}

/* 背景 */
.slider{
position:absolute;
cursor:pointer;
top:0;
left:0;
right:0;
bottom:0;
background:#ccc;
border-radius:26px;
transition:0.25s;
}

/* 白い丸 */
.slider::before{
content:"";
position:absolute;
height:20px;
width:20px;
left:3px;
top:3px;
background:white;
border-radius:50%;
transition:0.25s;
}

/* ON */
input:checked + .slider{
background:#4cd964;
}

/* 丸移動 */
input:checked + .slider::before{
transform:translateX(20px);
}

.tooltip {
  position: relative;
  display: inline-block;
}

.tooltip-box {
  position: absolute;
  bottom: 70%;
  left: 50%;
  transform: translateX(-50%);

  background: #333;
  color: white;

  padding: 10px 14px;
  border-radius: 12px;

  opacity: 0;

  transition: 0.2s;

  pointer-events: none;

}

.tooltip:hover .tooltip-box {
  opacity: 1;

  pointer-events: auto;
}

/* リンク */
.tooltip-box a {

}

.tooltip-box a:hover {

}

body.cursor-off #custom-cursor,
body.cursor-off #cursor-dot,
body.cursor-off .cursor-ripple{

}

/* カーソルOFF時は通常カーソルに戻す */

body.cursor-off * {
  cursor: auto !important;
}
